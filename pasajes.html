 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusBus - Buscar Pasajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/pasajes.css">
</head>
<body>

    <button class="menu-toggle-btn" id="menuToggle"><i class="fas fa-bars"></i></button>

    <nav class="sidebar" id="sidebarMenu">
        <div class="sidebar-brand"><i class="fas fa-bus"></i> <span>PlusBus</span></div>
        <ul class="sidebar-links">
            <li><a href="/"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="/pasajes" class="active"><i class="fas fa-ticket-alt"></i> Pasajes</a></li>
            <li><a href="/pago"><i class="fas fa-credit-card"></i> Pagar Ticket</a></li>
            <li><a href="/turismo"><i class="fas fa-map-marked-alt"></i> Guía Turismo</a></li>
        </ul>
    </nav>

    <div class="main-layout" id="mainLayout">
        <section class="container">
            
            <div class="pasajes-view-layout">
                <aside class="filter-sidebar-box">
                    <h3>Filtrar Búsqueda</h3>
                    <div class="filter-group">
                        <label>Ciudad de Origen</label>
                        <input type="text" id="filtroOrigen" placeholder="Ej. La Paz">
                    </div>
                    <div class="filter-group">
                        <label>Ciudad de Destino</label>
                        <input type="text" id="filtroDestino" placeholder="Ej. Cochabamba">
                    </div>
                    <div class="filter-group">
                        <label>Fecha de Viaje</label>
                        <input type="date" id="filtroFecha">
                    </div>
                    <button id="btnFiltrar" class="btn-apply-filters"><i class="fas fa-sliders-h"></i> Aplicar Filtros</button>
                </aside>

                <main class="results-main-area">
                    <div class="results-top-bar">
                        <h2>Resultados de Salidas Disponibles</h2>
                        <span id="contadorViajes" class="results-badge">Buscando flotas...</span>
                    </div>

                    <div id="resultadosPasajes" class="cards-stack">
                        <div class="skeleton-wave"></div>
                        <div class="skeleton-wave"></div>
                    </div>
                </main>
            </div>
        </section>
    </div>

    <div id="viajesDataContainer" data-viajes='{{ viajes|tojson if viajes else "[]" }}' style="display:none;"></div>
    <script src="/static/js/main.js"></script>
</body>
</html>
